version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: orka_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orka_reducida
    volumes:
      - orka_db_data:/var/lib/postgresql/data
      - ./backup:/backup
    ports:
      - "5432:5432"
    networks:
      - orka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orka_reducida"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./procuraBackend
    container_name: orka_backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/orka_reducida?schema=public"
      JWT_SECRET: "orka-secret-key-change-in-production"
      JWT_EXPIRES_IN: "24h"
      PORT: "3006"
      NODE_ENV: "production"
      COMPANY_NAME: "Orka Reducida"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3006:3006"
    networks:
      - orka_network

  frontend:
    build: ./procuraFrontend
    container_name: orka_frontend
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - orka_network

volumes:
  orka_db_data:

networks:
  orka_network:
    driver: bridge
